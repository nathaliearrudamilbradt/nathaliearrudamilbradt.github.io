<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Centuries of Byzantium</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: "Helvetica Neue", Arial, sans-serif; }
  #canvas-container { width: 100%; height: 100%; }
  canvas { display: block; }

  #click-prompt {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
    pointer-events: none; z-index: 100;
  }
  #click-prompt span {
    background: rgba(255,255,255,0.92); color: #2c1810;
    padding: 18px 36px; border-radius: 6px;
    font-size: 16px; font-weight: 400; letter-spacing: 0.5px;
    border: 1px solid #d0c8b0;
  }

  #interact-prompt {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    display: none; background: rgba(255,255,255,0.88); color: #2c1810;
    padding: 10px 24px; border-radius: 4px; font-size: 14px;
    font-weight: 400; letter-spacing: 0.3px;
    border: 1px solid #c4a460;
    pointer-events: none; z-index: 90;
  }

  #info-panel {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(250, 248, 242, 0.96);
    border-top: 2px solid #c4a460;
    padding: 24px 40px 28px;
    transform: translateY(100%);
    transition: transform 0.35s ease;
    z-index: 80;
    max-height: 45vh;
    overflow-y: auto;
  }
  #info-panel.visible { transform: translateY(0); }

  .info-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .info-number {
    font-size: 13px; font-weight: 600; color: #8b6914;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .info-theme {
    font-size: 12px; color: #8b6914; font-style: italic;
    background: rgba(184,146,58,0.1); padding: 3px 12px; border-radius: 3px;
  }
  .info-title {
    font-family: Georgia, serif; font-size: 22px; font-weight: 600;
    color: #2c1810; margin-bottom: 6px;
  }
  .info-meta {
    font-size: 13px; color: #6a6a6a; margin-bottom: 14px;
    font-weight: 300;
  }
  .info-bio {
    font-size: 15px; color: #3a3a3a; line-height: 1.65;
    max-width: 860px; font-weight: 300;
  }

  /* Crosshair */
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 16px; height: 16px; pointer-events: none; z-index: 50;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.5);
  }
  #crosshair::before { width: 1px; height: 16px; left: 7.5px; top: 0; }
  #crosshair::after { width: 16px; height: 1px; top: 7.5px; left: 0; }

  /* Controls hint */
  #controls-hint {
    position: fixed; bottom: 10px; right: 14px;
    font-size: 11px; color: rgba(255,255,255,0.35);
    pointer-events: none; z-index: 50;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="crosshair"></div>

<div id="click-prompt"><span>Click to enter the gallery &mdash; WASD to move, mouse to look</span></div>
<div id="interact-prompt"></div>
<div id="info-panel"></div>
<div id="controls-hint">WASD move &middot; Mouse look &middot; E interact &middot; ESC release</div>

s. By 1400 the Empire had been reduced to Constantinople itself. The very conditions destroying it likely increased demand for security objects. As households faced Ottoman siege and political uncertainty, protecting portable valuables became urgent. A bronze padlock was precisely what ordinary consumers prioritized in times of crisis."},{id:2,title:"Bowl with Lioness",date:"13th\u201314th century CE",material:"Ceramic",museum:"Dumbarton Oaks",accession:"BZ.1958.93",color:"#a06830",theme:"Domestic Life / Craft",imageUrl:null,bio:"Decorated in the sgraffito technique \u2014 lines scratched through white slip, then glazed in olive greens and iron yellows \u2014 this bowl bears a prowling lioness. Animals were the most popular subject on Byzantine domestic dinnerware. The lion was associated with King David, imperial hunt imagery, and the hero Digenes Akrites. Three gaps in the glaze on the lioness\u2019s shoulder, thigh, and back reveal where the bowl rested on firing stilts in the kiln. These are traces of a working city \u2014 workshops producing domestic goods for Constantinople\u2019s households even as the Empire contracted around them."},{id:3,title:"Pyxis with Imperial Families and Ceremonial Scenes",date:"1403\u20131404 CE",material:"Ivory",museum:"Dumbarton Oaks",accession:"BZ.1936.24",color:"#e8d898",theme:"Imperial Power / Diplomacy",imageUrl:null,bio:"Sixteen figures encircle this ivory pyxis barely four centimeters tall. A kneeling figure offers a miniature city to an emperor. Two imperial groups stand in stiff frontal poses, followed by musicians and dancers. The scene records the agreement of 1403 between Emperor John VII and his uncle Manuel II, who had spent four years begging Western courts for military aid against the Ottomans. The pyxis celebrates this with the full vocabulary of imperial ceremony. But the Empire being so solemnly divided was, by 1403, reduced to a single city and a few coastal fragments. The festive imagery is a performance of power by rulers who had very little of it."},{id:4,title:"Gold Seal of John VIII Palaiologos",date:"1425\u20131448 CE",material:"Gold",museum:"Dumbarton Oaks",accession:"Seal Collection",color:"#e8b820",theme:"Imperial Power / War",imageUrl:null,bio:"A golden seal bearing Christ on one face and Emperor John VIII on the other \u2014 in full imperial regalia, identified as autokrator. John VIII was the penultimate emperor of Byzantium. He ruled over little more than Constantinople. In 1439 he signed the Act of Union at Florence, placing the Byzantine Church under the Pope in exchange for a Western crusade. The crusade was crushed at Varna in 1444. John died in 1448, five years before his Empire. The seal formula \u2014 Christ legitimizing Emperor \u2014 persisted unchanged to the very end, a testament to the tenacity of ideology as the institutions it justified ceased to exist."},{id:5,title:"Stavraton of Manuel II Palaiologos",date:"1391\u20131425 CE",material:"Silver",museum:"Harvard Art Museums",accession:"1951.31.4.2006",color:"#b8bac8",theme:"Economy / Monetary Collapse",imageUrl:null,bio:"The stavraton was introduced around 1367 to fill a catastrophic void: Byzantium had stopped minting gold. The hyperpyron, the gold standard that had defined Byzantine economic power for centuries, was discontinued in the 1350s. The Empire no longer had the gold, the territory, or the economy to sustain it. After 1400, Byzantine coinage became essentially irrelevant as Venetian ducats became the dominant medium of exchange even within Constantinople. The Italian merchants who controlled Byzantine trade also controlled its money supply. The Empire could not feed itself, defend itself, or pay its soldiers without them."},{id:6,title:"Icon of Saint Peter",date:"Early 14th century CE",material:"Tempera and gold on wood",museum:"Dumbarton Oaks",accession:"BZ.1982.2",color:"#e8c060",theme:"Religion / Political Theology",imageUrl:null,bio:"A life-sized icon of Saint Peter in tempera and gold leaf. Around his neck hang two keys \u2014 the symbol of papal primacy, the theological foundation of Rome\u2019s claim over all Christendom. In a Byzantine icon of the early 14th century, their prominence is not neutral. Emperors repeatedly sought union with Rome as the price of Western military aid. The clergy and people of Constantinople largely refused. George Scholarios, the first Patriarch under Ottoman rule, captured the sentiment: they would rather submit to the Sultan than to the Pope. An icon of Peter with his keys carries that argument within its gold-leaf surface."}],ot=new os;ot.background=new ze(16117992);var Kt=new wt(65,window.innerWidth/window.innerHeight,.1,200);Kt.position.set(0,1.7,28);var sn=new Na({antialias:!0});sn.setSize(window.innerWidth,window.innerHeight);sn.setPixelRatio(Math.min(window.devicePixelRatio,2));sn.shadowMap.enabled=!0;sn.shadowMap.type=kr;sn.toneMapping=bs;sn.toneMappingExposure=1.2;document.getElementById("canvas-container").appendChild(sn.domElement);var ka=new rt({color:15920352,roughness:.85,metalness:0}),Zm=new rt({color:15261904,roughness:.3,metalness:.05}),Jm=new rt({color:16447214,roughness:.9}),$m=new rt({color:4008735,roughness:.6,metalness:.1}),hh=new rt({color:16777215,roughness:.4,metalness:.02}),xt=65,_t=6,kt=4.5,Ga=new Ce(new Ct(_t,xt),Zm);Ga.rotation.x=-Math.PI/2;Ga.position.set(0,0,-xt/2+30);Ga.receiveShadow=!0;ot.add(Ga);for(let i=0;i<xt;i+=2){let e=new Ce(new Ct(_t,.02),new rt({color:13682872,roughness:.5}));e.rotation.x=-Math.PI/2,e.position.set(0,.001,30-i),ot.add(e)}for(let i=-_t/2;i<=_t/2;i+=2){let e=new Ce(new Ct(.02,xt),new rt({color:13682872,roughness:.5}));e.rotation.x=-Math.PI/2,e.position.set(i,.001,-xt/2+30),ot.add(e)}var xl=new Ce(new Ct(_t,xt),Jm);xl.rotation.x=Math.PI/2;xl.position.set(0,kt,-xt/2+30);ot.add(xl);var Ha=new Ce(new Ct(xt,kt),ka);Ha.position.set(-_t/2,kt/2,-xt/2+30);Ha.rotation.y=Math.PI/2;Ha.receiveShadow=!0;ot.add(Ha);var Wa=new Ce(new Ct(xt,kt),ka);Wa.position.set(_t/2,kt/
